  <script>
    (() => {
      const track = document.getElementById('track');
      const originals = Array.from(track.children);

      // 3 cópias do conjunto -> loop infinito (começa no conjunto do meio)
      for (let s = 0; s < 2; s++) originals.forEach((li) => track.appendChild(li.cloneNode(true)));
      const slides = Array.from(track.children);
      const vids = Array.from(track.querySelectorAll('video'));

      const N = originals.length; // qtd de vídeos por conjunto
      let P = 0, base = 0; // P = largura de um conjunto; base = posição central do conjunto do meio
      const centerOf = (el) => el.offsetLeft - (track.clientWidth - el.clientWidth) / 2;
      const measure = () => {
        P = slides[N].offsetLeft - slides[0].offsetLeft;
        base = centerOf(slides[N]);
      };
      const wrap = () => {
        if (!P) { measure(); if (!P) return; track.scrollLeft = base; return; }
        if (track.scrollLeft < base - P / 2) track.scrollLeft += P;
        else if (track.scrollLeft > base + P / 2) track.scrollLeft -= P;
      };
      // efeito de foco: o slide do centro fica maior e nítido; os outros, menores e desfocados
      const update = () => {
        const mid = track.scrollLeft + track.clientWidth / 2;
        const s = (slides[1].offsetLeft - slides[0].offsetLeft) || 1;
        slides.forEach((li) => {
          const v = li.firstElementChild;
          const d = Math.min(Math.abs(li.offsetLeft + li.clientWidth / 2 - mid) / s, 1);
          v.style.transform = 'scale(' + (1 - 0.22 * d).toFixed(3) + ')';
          v.style.filter = d < 0.02 ? 'none' : 'blur(' + (3.5 * d).toFixed(2) + 'px)';
        });
      };

      // posiciona no conjunto do meio; se a aba abriu em segundo plano (layout zerado), tenta de novo
      const init = () => {
        measure();
        if (P) { track.scrollLeft = base; update(); return true; }
        return false;
      };
      if (!init()) {
        const retry = setInterval(() => { if (init()) clearInterval(retry); }, 150);
      }
      let raf = 0;
      track.addEventListener('scroll', () => {
        wrap();
        if (!raf) raf = requestAnimationFrame(() => { raf = 0; update(); });
      }, { passive: true });
      window.addEventListener('resize', () => { measure(); wrap(); update(); });

      // setas (desktop)
      const step = () => slides[1].offsetLeft - slides[0].offsetLeft;
      document.getElementById('prev').addEventListener('click', () => track.scrollBy({ left: -step(), behavior: 'smooth' }));
      document.getElementById('next').addEventListener('click', () => track.scrollBy({ left: step(), behavior: 'smooth' }));

      // vídeos visíveis tocam sozinhos (mudos); os que saem pausam
      const io = new IntersectionObserver((es) => es.forEach((e) => {
        const v = e.target;
        if (e.isIntersecting) v.play().catch(() => {});
        else { v.pause(); v.muted = true; }
      }), { threshold: .6 });
      vids.forEach((v) => { v.muted = true; io.observe(v); });

      // clique alterna o som (liga aqui, muta os outros)
      vids.forEach((v) => v.addEventListener('click', () => {
        if (v.muted) {
          vids.forEach((o) => { if (o !== v) o.muted = true; });
          v.muted = false;
          v.play().catch(() => {});
        } else {
          v.muted = true;
        }
      }));

      // menu de extensões (+)
      const plus = document.getElementById('plus');
      const menu = document.getElementById('ext-menu');
      if (plus && menu) {
        const setOpen = (o) => { menu.hidden = !o; plus.setAttribute('aria-expanded', String(o)); };
        plus.addEventListener('click', (e) => { e.stopPropagation(); setOpen(menu.hidden); });
        document.addEventListener('click', (e) => { if (!menu.hidden && !menu.contains(e.target) && e.target !== plus) setOpen(false); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setOpen(false); });
      }
    })();
  </script>
